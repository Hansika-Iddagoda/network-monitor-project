<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Network Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="monitor" class="hide-speed">
    <div id="header">
        <h2>Live Network Monitor</h2>
        <div id="controls">
            <button id="freezeBtn">Freeze Capturing</button>
            <button id="clearBtn">Clear Logs</button>
            <button id="exportBtn">Export Logs</button>
            <div class="dropdown">
                <button id="settingsBtn">SETTINGS ▾</button>
                <div id="dropdownContent" class="dropdown-menu">

                    <label class="toggle-button">
                        <input type="checkbox" id="logToggle" checked>
                        <span class="button-surface">
                            <span class="tick-box"></span>
                            Auto Scroll
                        </span>
                    </label>

                    <div id="catagories">
                        <label class="toggle-button">
                            <input type="checkbox" id="speedToggle"> 
                            <span class="button-surface">
                                <span class="tick-box"></span>
                                Show Speed
                            </span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <canvas id="speedGraph" width="600" height="200"></canvas>
    
    <div class="line header-row">
        <span>PROTO</span>
        <span>SOURCE IP</span>
        <span>DEST IP</span>
        <span>SIZE</span>
        <span class="col-speed">SPEED</span>
    </div>

    <div id="logs"></div>
</div>

    <script src="code.js"></script>
</body>

</html>
