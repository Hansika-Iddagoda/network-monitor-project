<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Network Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="monitor">
    <div id="header">
        <h2>Live Network Monitor</h2>
        <button id="freezeBtn">Freeze Capturing</button>
    </div>
    <canvas id="speedGraph" width="600" height="200"></canvas>
    
    <div class="line header-row">
        <span>PROTO</span>
        <span>SOURCE IP</span>
        <span>DEST IP</span>
        <span>SIZE</span>
        <span>SPEED</span>
    </div>

    <div id="logs"></div>
</div>

    <script src="code.js"></script>
</body>

</html>
